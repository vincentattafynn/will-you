<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>For You</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Pacifico&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #FBF4E8;
    --syrup:      #7C3900;
    --amber:      #b85d19;
    --muted:      #a08060;
  }

  html, body { width: 100%; height: 100%; }

  body {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  #app {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: min(90vw, 400px);
  }

  .syrup {
    font-family: 'Pacifico', cursive;
    color: var(--syrup);
    text-shadow:
      2px 2px 0px rgba(139,69,19,0.28),
      1px 1px 5px rgba(255,190,0,0.38);
    line-height: 1.4;
  }

  .serif {
    font-family: 'Cormorant Garamond', Georgia, serif;
  }

  #top-msg {
    font-size: clamp(1rem, 4.2vw, 1.2rem);
    text-align: center;
    margin-bottom: 1.4rem;
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  #top-msg.hidden {
    opacity: 0;
    transform: translateY(-8px);
    pointer-events: none;
  }

  #plate-wrap {
    width: clamp(200px, 68vw, 300px);
    height: clamp(200px, 68vw, 300px);
    transition: transform 0.16s cubic-bezier(.34,1.5,.64,1);
  }
  #plate-wrap.pop { transform: scale(1.04); }

  #plate-svg {
    width: 100%; height: 100%;
    overflow: visible;
    filter: drop-shadow(0 6px 22px rgba(120,60,10,0.14));
  }

  .pc-layer {
    transition: opacity 0.38s ease, transform 0.38s ease;
    transform-origin: 160px 260px;
  }

  .crumb {
    position: fixed;
    width: 6px; height: 6px;
    border-radius: 50%;
    pointer-events: none;
    animation: crumbFly 0.75s ease-out forwards;
    z-index: 100;
  }
  @keyframes crumbFly {
    0%   { opacity: 0.9; transform: translate(0,0) scale(1); }
    100% { opacity: 0;   transform: translate(var(--dx), var(--dy)) scale(0.2); }
  }

  .ripple {
    position: fixed;
    border-radius: 50%;
    background: rgba(184,93,25,0.11);
    pointer-events: none;
    transform: scale(0);
    animation: rippleOut 0.5s ease-out forwards;
    z-index: 5;
  }
  @keyframes rippleOut { to { transform: scale(5.5); opacity: 0; } }

  #reveal {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
    opacity: 0;
    transform: translateY(22px);
    transition: opacity 0.9s 0.3s ease, transform 0.9s 0.3s cubic-bezier(.25,1,.4,1);
    pointer-events: none;
    padding-top: 1.6rem;
    width: 100%;
    text-align: center;
  }
  #reveal.show {
    opacity: 1;
    transform: none;
    pointer-events: auto;
  }

  #statement {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    align-items: center;
    transition: opacity 0.5s;
  }

  #line-1 {
    font-size: clamp(0.9rem, 3.4vw, 1.05rem);
    color: var(--muted);
    font-style: italic;
    letter-spacing: 0.04em;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.7s 0.6s, transform 0.7s 0.6s ease;
  }
  #line-2 {
    font-size: clamp(1.55rem, 6.8vw, 2.05rem);
    line-height: 1.25;
    padding: 0 0.5rem;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.8s 1s ease, transform 0.8s 1s cubic-bezier(.25,1,.4,1);
  }
  #line-3 {
    font-size: clamp(1.35rem, 5.8vw, 1.8rem);
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.8s 1.55s ease, transform 0.8s 1.55s cubic-bezier(.25,1,.4,1);
  }
  #reveal.show #line-1,
  #reveal.show #line-2,
  #reveal.show #line-3 { opacity: 1; transform: none; }

  .btn-row {
    display: flex;
    gap: 16px;
    justify-content: center;
    align-items: center;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.7s 2.2s ease, transform 0.7s 2.2s ease;
    position: relative;
  }
  #reveal.show .btn-row { opacity: 1; transform: none; }

  .big-btn {
    font-family: 'Pacifico', cursive;
    font-size: clamp(0.95rem, 4vw, 1.15rem);
    padding: 0.7em 2em;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.18s cubic-bezier(.34,1.5,.64,1), opacity 0.3s, font-size 0.3s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .big-btn:active { transform: scale(0.95) !important; }

  #btn-yes {
    background: var(--syrup);
    color: #fdf4e3;
    text-shadow: 1px 1px 3px rgba(50,15,0,0.35);
    box-shadow: 0 4px 18px rgba(120,50,0,0.28);
  }
  #btn-yes:hover { transform: scale(1.06); }

  #btn-no {
    background: transparent;
    color: var(--muted);
    border: 1.5px solid #d4b898;
  }
  #btn-no:hover { transform: scale(1.03); }

  /* ── X / Exit button ── */
  #btn-exit {
    position: fixed;
    top: 18px;
    right: 18px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1.5px solid #d4b898;
    background: transparent;
    color: var(--muted);
    font-size: 1rem;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    transition: background 0.2s, transform 0.15s;
    font-family: 'Cormorant Garamond', serif;
    -webkit-tap-highlight-color: transparent;
  }
  #btn-exit.visible { display: flex; }
  #btn-exit:hover { background: rgba(160,128,96,0.12); transform: scale(1.08); }
  #btn-exit:active { transform: scale(0.94); }

  /* Exit screen */
  #exit-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 300;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
  }
  #exit-screen.show {
    opacity: 1;
    pointer-events: auto;
  }
  #exit-msg {
    font-size: clamp(1.1rem, 4.5vw, 1.4rem);
    text-align: center;
    padding: 2rem;
    line-height: 1.7;
  }

  #result-msg {
    font-size: clamp(1.2rem, 5.2vw, 1.6rem);
    text-align: center;
    padding: 0 0.5rem;
    opacity: 0;
    transform: scale(0.9);
    transition: opacity 0.6s, transform 0.6s cubic-bezier(.34,1.4,.64,1);
    min-height: 2rem;
    line-height: 1.4;
  }
  #result-msg.show { opacity: 1; transform: scale(1); }

  .heart-float {
    position: fixed;
    font-size: 1.3rem;
    pointer-events: none;
    animation: heartRise 3s ease-out forwards;
    z-index: 999;
  }
  @keyframes heartRise {
    0%   { opacity: 0.85; transform: translateY(0) scale(1); }
    100% { opacity: 0;    transform: translateY(-70vh) scale(0.5); }
  }

  #syrup-drip { opacity: 0; transition: opacity 0.8s 0.5s ease; }
  #syrup-drip.show { opacity: 1; }
</style>
</head>
<body>

<!-- X button (appears after first No) -->
<button id="btn-exit" onclick="handleExit()" aria-label="Exit">✕</button>

<!-- Exit screen -->
<div id="exit-screen">
  <p id="exit-msg" class="syrup">ok.<br>but just know<br>i meant every word. 🍁</p>
</div>

<div id="app">

  <div id="plate-wrap">

        <ellipse cx="160" cy="197" rx="62" ry="8"  fill="#dc9668"/>
        <ellipse cx="160" cy="195" rx="58" ry="6"  fill="#ecaa80"/>
        <circle cx="146" cy="194" r="2.5" fill="#9a5020" opacity="0.42"/>
        <circle cx="165" cy="193" r="2"   fill="#9a5020" opacity="0.36"/>

    <div class="btn-row">

<script>
  const SHEET_URL = 'https://script.google.com/macros/s/AKfycbxzh4VTx2utbjXfWC1ec4E9nxEhPWihucuWM89hS_zkxM0HKE9iuR7dTBhTZRyIA7k/exec';

  const MAX = 5;
  let bites = 0, revealed = false, answered = false, exited = false;
  let noCount = 0;

  const topMsg    = document.getElementById('top-msg');
  const plateWrap = document.getElementById('plate-wrap');
  const revealDiv = document.getElementById('reveal');
  const resultMsg = document.getElementById('result-msg');
  const btnNo     = document.getElementById('btn-no');
  const btnExit   = document.getElementById('btn-exit');
  const exitScreen= document.getElementById('exit-screen');
  const syrupDrip = document.getElementById('syrup-drip');

  const biteStates = [
    () => { hide('whip'); hide('berries'); hide('butter-pat'); hide('syrup-top'); grow('bite-a',40,30); },
    () => { hide('pc1'); grow('bite-b',48,28); },
    () => { hide('pc2'); grow('bite-c',52,30); },
    () => { hide('pc3'); grow('bite-d',52,30); },
    () => { hide('pc4'); hide('pc5'); grow('bite-e',90,70); syrupDrip.classList.add('show'); },
  ];

  function hide(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.style.transition = 'opacity 0.35s ease, transform 0.35s ease';
    el.style.transformOrigin = 'center';
    el.style.opacity = '0';
    el.style.transform = 'scale(0.85) translateY(-8px)';
  }

  function grow(id, rx, ry) {
    const el = document.getElementById(id);
    if (el) { el.setAttribute('rx', rx); el.setAttribute('ry', ry); }
  }

  function sendToSheet(data) {
    fetch(SHEET_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    }).catch(() => {});
  }

  function doTap(cx, cy) {
    if (revealed || answered || bites >= MAX) return;
    bites++;
    spawnRipple(cx, cy);
    spawnCrumbs(cx, cy);
    plateWrap.classList.add('pop');
    setTimeout(() => plateWrap.classList.remove('pop'), 180);
    biteStates[bites - 1]?.();
    if (bites >= MAX) {
      revealed = true;
      setTimeout(() => {
        topMsg.classList.add('hidden');
        setTimeout(() => revealDiv.classList.add('show'), 500);
      }, 500);
    }
  }

  function spawnRipple(x, y) {
    const r = document.createElement('div');
    r.className = 'ripple';
    const s = 50;
    r.style.cssText = `width:${s}px;height:${s}px;left:${x-s/2}px;top:${y-s/2}px;`;
    document.body.appendChild(r);
    setTimeout(() => r.remove(), 550);
  }

  function spawnCrumbs(x, y) {
    const cols = ['#c87040','#e0a870','#a05828','#d08050'];
    for (let i = 0; i < 6; i++) {
      const c = document.createElement('div');
      c.className = 'crumb';
      const a = Math.random() * Math.PI * 2;
      const d = 28 + Math.random() * 48;
      c.style.cssText = `left:${x}px;top:${y}px;background:${cols[i%cols.length]};--dx:${Math.cos(a)*d}px;--dy:${Math.sin(a)*d}px;animation-delay:${Math.random()*0.07}s;`;
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 850);
    }
  }

  document.body.addEventListener('click', e => { if (!revealed) doTap(e.clientX, e.clientY); });
  document.body.addEventListener('touchstart', e => {
    if (!revealed) { const t = e.changedTouches[0]; doTap(t.clientX, t.clientY); }
  }, { passive: true });

  function handleYes(e) {
    e.stopPropagation();
    if (answered) return;
    answered = true;

    sendToSheet({ answer: 'Yes', no_count: noCount, exited: false });

    btnNo.style.cssText += ';opacity:0;transform:scale(0);transition:transform 0.4s,opacity 0.4s;';
    btnNo.disabled = true;
    btnExit.classList.remove('visible');
    e.currentTarget.style.pointerEvents = 'none';

    const colors = ['#b85d19','#e8a83d','#7c3900','#f5c880','#fdf4e3'];
    confetti({ particleCount: 80, spread: 75, origin: { y: 0.58 }, colors, gravity: 0.95 });
    setTimeout(() => {
      confetti({ particleCount: 35, angle: 60,  spread: 48, origin: { x: 0 }, colors });
      confetti({ particleCount: 35, angle: 120, spread: 48, origin: { x: 1 }, colors });
    }, 350);

    document.getElementById('statement').style.cssText = 'opacity:0;transition:opacity 0.5s;';
    document.querySelector('.btn-row').style.cssText = 'opacity:0;transition:opacity 0.4s;';

    setTimeout(() => {
      resultMsg.textContent = 'Finally. ❤️';
      resultMsg.classList.add('show');
    }, 500);

    const hearts = ['❤️','🧡','💛'];
    for (let i = 0; i < 10; i++) {
      setTimeout(() => {
        const h = document.createElement('div');
        h.className = 'heart-float';
        h.textContent = hearts[i % hearts.length];
        h.style.cssText = `left:${10 + Math.random()*80}vw;bottom:8vh;animation-duration:${2+Math.random()*1.5}s;`;
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 3500);
      }, i * 200);
    }
  }

  function handleNo(e) {
    e.stopPropagation();
    if (answered) return;
    noCount++;

    // Show X button after first No
    btnExit.classList.add('visible');

    if (noCount >= 3) {
      btnNo.style.cssText += ';transform:scale(0);opacity:0;transition:transform 0.4s,opacity 0.4s;';
      btnNo.disabled = true;
      return;
    }

    const moves = ['translate(55px,-20px)', 'translate(-60px,15px)'];
    btnNo.style.transition = 'transform 0.22s cubic-bezier(.34,1.5,.64,1), font-size 0.3s';
    btnNo.style.transform = moves[(noCount - 1) % moves.length];
    const fs = parseFloat(getComputedStyle(btnNo).fontSize);
    btnNo.style.fontSize = (fs * 0.82) + 'px';
    setTimeout(() => {
      btnNo.style.transition = 'transform 0.4s ease';
      btnNo.style.transform = 'scale(0.88)';
    }, 260);
  }

  function handleExit() {
    if (exited) return;
    exited = true;

    sendToSheet({ answer: 'Exited', no_count: noCount, exited: true });

    exitScreen.classList.add('show');
  }
</script>
</body>
